# Render Blueprint - Circulara shared Observe backend (go-live).
# Matches CTO deploy-prep (cto_golive_deploy_prep_20260707.md) + the go-live
# model (decisions.md 2026-07-07): ONE shared backend + ONE Postgres/pgvector,
# free = shared workspaces (schema-per-workspace), paid = dedicated later.
# Provisioning is founder-approved (~$15-30/mo); the actual deploy is a founder
# "flip public" go. Secrets are set in the Render dashboard (sync:false), never
# committed. pgvector is enabled by the first migration (CREATE EXTENSION).
databases:
  - name: circulara-observe-db
    databaseName: circulara
    plan: basic-256mb      # Render Postgres; pgvector supported natively
    postgresMajorVersion: "16"

services:
  - type: web
    name: circulara-observe-backend
    runtime: node
    plan: starter
    rootDir: .                              # install at workspace ROOT so npm links @circulara/schema
    # dev deps (esbuild + tsx) are needed at BUILD only; runtime is compiled dist/main.js on
    # plain node (no tsx resident) - builder.20260709.001 memory fix for the 512MB Starter box.
    buildCommand: npm install --include=dev && npm run build -w @circulara/backend
    startCommand: npm run start -w @circulara/backend   # now: node dist/main.js
    healthCheckPath: /healthz
    autoDeploy: false             # deploy on explicit founder go, not on push
    envVars:
      - key: NODE_ENV
        value: production          # B3: binds 0.0.0.0:$PORT
      - key: DATABASE_URL
        fromDatabase:
          name: circulara-observe-db
          property: connectionString
      - key: CIRCULARA_AUTH_MODE
        value: consumer            # free Observe: email magic-link + Google sign-in
                                   # (enterprise SSO/oidc is reserved for paid)
      - key: CIRCULARA_APP_BASE_URL
        value: https://plugin.circulara.ai
                                   # public URL before publish (OAuth callback + magic links)
      - key: CIRCULARA_LIVE_CATALOGS
        value: "true"              # live free catalogs (HF/CKAN/RODA)
      - key: CIRCULARA_EMAIL_FROM
        value: hello@circularroute.com  # magic-link sender (Brevo-verified sender,
                                        # same as the marketing site's contact form)
      - key: CIRCULARA_SIGNUP_NOTIFY_TO
        value: hello@circularroute.com  # who gets a heads-up email on each new signup
      # --- secrets: set in the Render dashboard, sync:false (never in repo) ---
      - key: CIRCULARA_MASTER_KEY          # 32-byte hex KEK (envelope encryption)
        sync: false
      - key: CIRCULARA_AGENT_TOKEN_SECRET  # HS256 secret for agent-seat + workspace tokens
        sync: false
      - key: CIRCULARA_SESSION_SECRET      # HS256 secret for dashboard session cookies
        sync: false
      - key: GOOGLE_CLIENT_ID              # "Sign in with Google" OAuth client
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BREVO_API_KEY                 # magic-link transactional email (existing vendor)
        sync: false
      - key: CIRCULARA_OPS_TOKEN           # operator console /ops?key=... (Circulara-internal)
        sync: false
