# Wave 9 - maintenance automation (D12).
# GO-LIVE DECISION (founder 2026-07-07, decisions.md): NO scheduled eval until
# a PAYING customer exists. Free Observe only meters - the optimization-quality
# eval guards nothing a free user depends on, and pre-revenue API run-rate must
# stay ~$0. So the cron schedule is DISABLED at launch; the runner stays fully
# runnable on demand (workflow_dispatch + `npx tsx scripts/nightly.ts`).
# RE-ENABLE the schedule below at FIRST PAID CONVERSION (within the $200/mo cap).
name: nightly
on:
  # schedule:  # <-- UNCOMMENT at first paid conversion (go-live decision 2026-07-07)
  #   - cron: "17 6 * * *" # nightly deterministic core ($0 API)
  #   - cron: "47 6 * * 1" # weekly (Mon): poison slice, if OPENAI_API_KEY secret is set
  workflow_dispatch: {}

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      # QA M2: job-level env IS visible in step-level `if`; a step's own env is
      # not. Without this the weekly poison slice could never fire.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: .
      - name: deterministic core (eval + suite + registry candidate)
        run: npx tsx scripts/nightly.ts --with-registry
      # Task 010: the weekly poison slice runs once OPENAI_API_KEY is set as a
      # repo secret (Settings > Secrets and variables > Actions). Founder/CTO
      # action - the Builder cannot set repo secrets. Until set, env is empty
      # and this step is skipped (the `if` guard), so the workflow stays green.
      - name: poison slice (weekly, only when key configured)
        if: github.event.schedule == '47 6 * * 1' && env.OPENAI_API_KEY != ''
        run: |
          printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" > /tmp/ci.env
          CIRCULARA_ENV_FILE=/tmp/ci.env npx tsx scripts/eval-poison.ts
      - name: upload nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report
          path: packages/backend/reports/
